name: Build & Release

on:
  push:
    branches: [master]
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_flag: --mac
          - os: windows-latest
            platform_flag: --win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install root dependencies WITHOUT triggering postinstall's install-app-deps
      - name: Install root dependencies
        shell: bash
        run: npm install
        env:
          CP_RUN_INSTALL_APP_DEPS: '0'

      # Install app production dependencies (pure JS, no native modules)
      - name: Install app production dependencies
        shell: bash
        working-directory: app
        run: npm ci --omit=dev

      - name: Build webpack bundle
        shell: bash
        run: npm run build

      - name: Package Electron app
        shell: bash
        run: npx electron-builder ${{ matrix.platform_flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "StickyCommand v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          files: |
            dist/StickyCommand-*.dmg
            dist/StickyCommand-*.dmg.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "StickyCommand v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          files: |
            dist/StickyCommand-*.exe
            dist/StickyCommand-*.nsis.7z
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
