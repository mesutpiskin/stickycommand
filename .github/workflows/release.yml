name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_flag: --mac
          - os: windows-latest
            platform_flag: --win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install root dependencies WITHOUT triggering postinstall's install-app-deps
      - name: Install root dependencies
        shell: bash
        run: npm install
        env:
          CP_RUN_INSTALL_APP_DEPS: '0'

      # Install app/node_modules separately (skips electron-builder's install-app-deps
      # which downloads Electron headers from the dead atom.io mirror).
      - name: Install app production dependencies
        shell: bash
        working-directory: app
        run: npm install --production

      # Rebuild native modules (node-pty) using @electron/rebuild which fetches
      # headers from the live electronjs.org mirror instead of atom.io.
      - name: Rebuild native modules for Electron
        shell: bash
        working-directory: app
        run: npx --yes @electron/rebuild@^3 --version 13.6.9 --dist-url https://electronjs.org/headers --force

      - name: Build webpack bundle
        shell: bash
        run: npm run build

      - name: Package Electron app
        shell: bash
        run: ./node_modules/.bin/build ${{ matrix.platform_flag }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StickyCommand Build ${{ github.run_number }}"
          draft: false
          prerelease: true
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "StickyCommand Build ${{ github.run_number }}"
          draft: false
          prerelease: true
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
